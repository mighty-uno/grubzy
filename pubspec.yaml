name: zepkit
description: A simulated food delivery application designed to satisfy cravings and track real savings.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  provider: ^6.1.1 # For state management of CraveCoins, plate, and tracking
  intl: ^0.19.0 # For formatting currencies (Rupees)
  sqflite: ^2.4.3
  path_provider: ^2.1.6
  path: ^1.9.1
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset setup for food images and illustrations if needed
  # assets:
  #   - assets/images/
