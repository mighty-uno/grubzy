<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E8442C"/>
    </linearGradient>
    <linearGradient id="bagShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBEFE6"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- bag handle -->
  <path d="M198,214 Q256,118 314,214" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>

  <!-- bag body -->
  <path d="M166,206 L346,206 L328,372 Q326,392 306,392 L206,392 Q186,392 184,372 Z" fill="url(#bagShade)"/>

  <!-- bite cutout (same tone as background so it reads as a bite taken out) -->
  <circle cx="332" cy="222" r="38" fill="#EF522E"/>

  <!-- floating crumbs -->
  <circle cx="300" cy="182" r="9" fill="#FFFFFF"/>
  <circle cx="318" cy="164" r="6" fill="#FFFFFF"/>

  <!-- subtle bag fold lines for depth -->
  <path d="M214,240 L200,372" stroke="#F2DCC9" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M256,240 L252,372" stroke="#F2DCC9" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M298,240 L302,368" stroke="#F2DCC9" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>
